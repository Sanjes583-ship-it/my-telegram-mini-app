<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            margin: 30px 0 10px;
            font-size: 28px;
        }
        .user-info {
            font-size: 18px;
            margin: 20px 0;
            padding: 15px;
            background: var(--tg-theme-secondary-bg-color, #2d2d2d);
            border-radius: 12px;
        }
        button {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }
        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>🚀 AI Помощник</h1>
    
    <div class="user-info" id="user-info">
        Загрузка информации...
    </div>

    <p>Это твоё Telegram Mini App</p>

    <button onclick="sendDataToBot()">Отправить данные в бот</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();                    // Растянуть на весь экран

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user || {};
        document.getElementById('user-info').innerHTML = `
            Привет, <strong>${user.first_name || 'Пользователь'}</strong>!<br>
            ID: ${user.id || '—'}<br>
            Username: @${user.username || '—'}
        `;

        function sendDataToBot() {
            const data = {
                action: "mini_app_opened",
                user_id: user.id,
                message: "Я открыл мини-приложение из боковой кнопки!",
                time: new Date().toISOString()
            };
            
            tg.sendData(JSON.stringify(data));
            tg.showPopup({
                title: "Успешно!",
                message: "Данные отправлены в бот",
                buttons: [{type: "close"}]
            });
        }

        // Адаптация под тему Telegram
        tg.setHeaderColor("secondary_bg_color");
    </script>
</body>
</html>
